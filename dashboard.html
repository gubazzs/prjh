<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste</title>
    <link rel="stylesheet" href="src/css/style-dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>
<body>
    <main class="dashboard">

        <!-- CARD 1 -->
        <div class="dashboard-column" data-id="1">
            <div class="dashboard-title">
                <h2>
                    A Fazer
                </h2>

                <button class="add-card">
                    <i class="fa-solid fa-plus"></i>
                </button>
                <button class="delete-column">
                <i class="fa-solid fa-trash"></i>
            </button>
            </div>

            <div class="dashboard-cards">
                <div class="dashboard-card" draggable="true">
                    <div class="badge high">
                        <span>
                            Alta prioridade
                        </span>
                    </div>

                    <p class="title-card">
                        Revisar documento do projeto
                    </p>

                    <div class="card-infos">
                        <div class="card-icons">
                            <p>
                                <i class="fa-regular fa-comment">
                                    1
                                </i>
                            </p>

                            <p>
                                <i class="fa-solid fa-paperclip">
                                    1
                                </i>
                            </p>
                        </div>

                        <div class="user">
                            <img src="imagens/porco.jpg" alt="porco">
                            <i class="fa-solid fa-trash delete-card"></i>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- CARD 2 -->
        <div class="dashboard-column" data-id="2">
            <div class="dashboard-title">
                <h2>
                    Fazendo
                </h2>

                <button class="add-card">
                    <i class="fa-solid fa-plus"></i>
                </button>
                <button class="delete-column">
                <i class="fa-solid fa-trash"></i>
            </button>
            </div>

            <div class="dashboard-cards">
                <div class="dashboard-card" draggable="true">
                    <div class="badge medium">
                        <span>
                            Média prioridade
                        </span>
                    </div>

                    <p class="title-card">
                        Revisar documento do projeto
                    </p>

                    <div class="card-infos">
                        <div class="card-icons">
                            <p>
                                <i class="fa-regular fa-comment">
                                    1
                                </i>
                            </p>

                            <p>
                                <i class="fa-solid fa-paperclip">
                                    1
                                </i>
                            </p>
                        </div>

                        <div class="user">
                            <img src="imagens/porco.jpg" alt="porco">
                            <i class="fa-solid fa-trash delete-card"></i>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- CARD 3-->   
        <div class="dashboard-column" data-id="3">
            <div class="dashboard-title">
                <h2>
                    Concluído
                </h2>

                <button class="add-card">
                    <i class="fa-solid fa-plus"></i>
                </button>
                <button class="delete-column">
                <i class="fa-solid fa-trash"></i>
            </button>
            </div>

            <div class="dashboard-cards">
                <div class="dashboard-card" draggable="true">
                    <div class="badge low">
                        <span>
                            Baixa prioridade
                        </span>
                    </div>

                    <p class="title-card">
                        Revisar documento do projeto
                    </p>

                    <div class="card-infos">
                        <div class="card-icons">
                            <p>
                                <i class="fa-regular fa-comment">
                                    1
                                </i>
                            </p>

                            <p>
                                <i class="fa-solid fa-paperclip">
                                    1
                                </i>
                            </p>
                        </div>

                        <div class="user">
                            <img src="imagens/porco.jpg" alt="porco">
                            <i class="fa-solid fa-trash delete-card"></i>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <button class="add-column">
            <i class="fa-solid fa-plus"></i>
            <span>Adicionar coluna</span>
        </button>

    </main>

    <script src="src/javascript/script.js"></script>
</body>
</html>
