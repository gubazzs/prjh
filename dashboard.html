<body class="geral-dashboard">

<body class="geral-dashboard">

    <div class="kanban-wrapper">

            <div class="kanban-topo border-bottom-neon-todo">

                <span class="badge bg-primary rounded-pill">1</span>
            </div>
            <div class="kanban-conteudo" id="raia-a-fazer">

                </div>
            </div>
        </div>

        <div class="kanban-divisao">
            <div class="kanban-topo border-bottom-neon-doing">

            </div>
            <div class="kanban-conteudo" id="raia-em-andamento">
                </div>
        </div>

        <div class="kanban-divisao">
            <div class="kanban-topo border-bottom-neon-done">
