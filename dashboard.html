<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasky Dashboard</title>
    <link rel="stylesheet" href="src/css/style-dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
    <!-- HEADER COM MENU DE USUÁRIO -->
    <header class="dashboard-header">
    <div class="logo">Tasky</div>
    
    <div class="user-menu">
        <img id="user-avatar" src="imagens/porco.jpg" alt="Avatar" class="avatar-btn">
        <div id="user-dropdown" class="dropdown hidden">
            <div class="user-info">
                <img id="dropdown-avatar" src="imagens/porco.jpg" alt="">
                <div>
                    <strong id="user-name">Usuário</strong>
                    <small id="user-email">usuario@email.com</small>
                </div>
            </div> <hr>
            <button id="logout-btn">
                <i class="fa-solid fa-right-from-bracket"></i> Sair
            </button>
        </div>
    </div>
</header>

    <main class="dashboard">
        <!-- COLUNA 1 - ROSA -->
        <div class="dashboard-column" data-id="1" style="--column-color: #d573b6;">
            <div class="dashboard-title">
                <div class="title-left">
                    <input type="color" class="color-picker" value="#d573b6" title="Mudar cor da coluna">
                    <h2>A Fazer</h2>
                </div>
                <div class="column-actions">
                    <button class="add-card"><i class="fa-solid fa-plus"></i></button>
                    <button class="delete-column"><i class="fa-solid fa-trash"></i></button>
                </div>
            </div>
            <div class="dashboard-cards"></div>
        </div>

        <!-- COLUNA 2 - AZUL -->
        <div class="dashboard-column" data-id="2" style="--column-color: #58a6ff;">
            <div class="dashboard-title">
                <div class="title-left">
                    <input type="color" class="color-picker" value="#58a6ff" title="Mudar cor da coluna">
                    <h2>Fazendo</h2>
                </div>
                <div class="column-actions">
                    <button class="add-card"><i class="fa-solid fa-plus"></i></button>
                    <button class="delete-column"><i class="fa-solid fa-trash"></i></button>
                </div>
            </div>
            <div class="dashboard-cards"></div>
        </div>

        <!-- COLUNA 3 - VERDE -->   
        <div class="dashboard-column" data-id="3" style="--column-color: #6ed0bc;">
            <div class="dashboard-title">
                <div class="title-left">
                    <input type="color" class="color-picker" value="#6ed0bc" title="Mudar cor da coluna">
                    <h2>Concluído</h2>
                </div>
                <div class="column-actions">
                    <button class="add-card"><i class="fa-solid fa-plus"></i></button>
                    <button class="delete-column"><i class="fa-solid fa-trash"></i></button>
                </div>
            </div>
            <div class="dashboard-cards"></div>
        </div>

        <button class="add-column">
            <i class="fa-solid fa-plus"></i>
            <span>Adicionar coluna</span>
        </button>
    </main>

    <script src="src/javascript/script.js"></script>
</body>
</html>
